# Configuracion de Apache para servir el frontend (build estatico) y
# redirigir /api al backend Node.js (puerto 4000 por defecto).
#
# Requiere los modulos: proxy, proxy_http
#   sudo a2enmod proxy proxy_http
#
# Instalar en /etc/apache2/sites-available/almacen3d.conf y luego:
#   sudo a2ensite almacen3d
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName almacen3d.delauz.es

    DocumentRoot /opt/almacen3d/frontend/dist

    <Directory /opt/almacen3d/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:4000/api
    ProxyPassReverse /api http://127.0.0.1:4000/api

    ErrorLog ${APACHE_LOG_DIR}/almacen3d_error.log
    CustomLog ${APACHE_LOG_DIR}/almacen3d_access.log combined
</VirtualHost>
